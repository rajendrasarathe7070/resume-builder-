<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ResumeHub – Public & Edit Links</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0a0c12; color: #edeef5; }
        .skill-bar-fill { transition: width 1s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .card-hover { transition: transform 0.25s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 35px -12px rgba(0,0,0,0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e1f2a; }
        ::-webkit-scrollbar-thumb { background: #8b5cf6; border-radius: 12px; }
    </style>
</head>
<body>

    <!-- Top Bar (Buttons change based on mode) -->
    <div class="fixed top-4 left-4 right-4 z-30 flex flex-wrap justify-between items-center gap-3 bg-black/40 backdrop-blur-xl p-2 rounded-2xl shadow-2xl">
        <div class="flex items-center gap-2 flex-1 min-w-[200px]">

            <input type="text" id="search-input" placeholder="Search by username or full name..." class="w-full px-4 py-2 rounded-full bg-white/10 border border-white/20 text-white placeholder-gray-500 outline-none focus:ring-2 focus:ring-purple-500">
            <button id="search-btn" class="bg-purple-600 hover:bg-purple-700 px-5 py-2 rounded-full text-sm font-semibold transition">🔍 Search</button>


        </div>
        <div class="flex gap-2">
            <!-- "New Resume" button always visible -->
            <button id="create-btn" class="bg-green-600 hover:bg-green-700 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1 shadow-md"><i data-lucide="plus" style="width:16px;height:16px;"></i> New Resume</button>
            <!-- Edit button only shown in edit mode (controlled by JS) -->
            <button id="edit-mode-btn" class="hidden bg-purple-600 hover:bg-purple-700 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1 shadow-md"><i data-lucide="edit-3" style="width:16px;height:16px;"></i> Edit</button>
            <!-- Download PDF button always visible (read-only also can print) -->
            <button id="download-btn" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-full text-sm font-semibold flex items-center gap-1 shadow-md"><i data-lucide="printer" style="width:16px;height:16px;"></i> PDF</button>
        </div>
    </div>

    <!-- Create Modal (when creating new resume) -->
    <div id="create-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 rounded-2xl max-w-md w-full p-6 shadow-2xl">
            <h2 class="text-2xl font-bold mb-4 text-center">✨ Create Your Resume</h2>
            <input type="text" id="new-username" placeholder="Username (no spaces, e.g., john_doe)" class="w-full p-3 border rounded-lg dark:bg-gray-800 mb-3 placeholder:text-gray-600">
            <input type="text" id="new-fullname" placeholder="Full Name" class="w-full p-3 border rounded-lg dark:bg-gray-800 mb-3 placeholder:text-gray-600">
            <input type="email" id="new-email" placeholder="Email" class="w-full p-3 border rounded-lg dark:bg-gray-800 mb-4 placeholder:text-gray-600">
            <div class="flex gap-3 justify-end">
                <button id="cancel-create-btn" class="px-4 py-2 border rounded-lg">Cancel</button>
                <button id="confirm-create-btn" class="px-4 py-2 bg-purple-600 text-white rounded-lg">Create</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal (full editing capabilities) -->
    <div id="edit-modal" class="hidden fixed inset-0 z-50 bg-black/80 backdrop-blur-md flex items-center justify-center p-4 overflow-auto">
        <div class="bg-white dark:bg-gray-900 rounded-2xl max-w-4xl w-full max-h-[90vh] overflow-auto shadow-2xl">
            <div class="sticky top-0 bg-white dark:bg-gray-900 p-4 border-b flex justify-between items-center">
                <h2 class="text-xl font-bold">✏️ Edit Resume</h2>
                <button id="close-edit-modal" class="text-2xl">✖</button>
            </div>
            <div class="p-6 space-y-5">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" id="edit-name" placeholder="Full Name" class="p-2 border rounded placeholder:text-gray-600">
                    <input type="text" id="edit-title" placeholder="Job Title" class="p-2 border rounded placeholder:text-gray-600">
                    <input type="email" id="edit-email" placeholder="Email" class="p-2 border rounded placeholder:text-gray-600">
                    <input type="text" id="edit-phone" placeholder="Phone" class="p-2 border rounded placeholder:text-gray-600">
                    <input type="text" id="edit-location" placeholder="Location" class="p-2 border rounded placeholder:text-gray-600">
                    <input type="text" id="edit-github" placeholder="GitHub" class="p-2 border rounded placeholder:text-gray-600">
                </div>
                <textarea id="edit-about" rows="3" placeholder="About Me" class="w-full p-2 border rounded placeholder:text-gray-600"></textarea>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-2">
                    <input type="text" id="heading-about" placeholder="About heading" class="placeholder:text-gray-600"><input type="text" id="heading-education" placeholder="Education" class="placeholder:text-gray-600"><input type="text" id="heading-experience" placeholder="Experience" class="placeholder:text-gray-600">
                    <input type="text" id="heading-skills" placeholder="Skills" class="placeholder:text-gray-600"><input type="text" id="heading-certificates" placeholder="Certificates" class="placeholder:text-gray-600"><input type="text" id="heading-projects" placeholder="Projects" class="placeholder:text-gray-600">
                </div>
                <textarea id="edit-certificates" rows="3" placeholder="Certificates (Name | Issuer | Year)" class="w-full p-2 border rounded font-mono text-sm placeholder:text-gray-600"></textarea>
                <textarea id="edit-skills" rows="4" placeholder='Skills JSON: [{"name":"JavaScript","level":92}]' class="w-full p-2 border rounded font-mono text-sm placeholder:text-gray-600"></textarea>
                <textarea id="edit-experience" rows="6" placeholder='Experiences JSON' class="w-full p-2 border rounded font-mono text-sm placeholder:text-gray-600"></textarea>
                <textarea id="edit-projects" rows="5" placeholder='Projects JSON' class="w-full p-2 border rounded font-mono text-sm placeholder:text-gray-600"></textarea>
            </div>
            <div class="sticky bottom-0 bg-white dark:bg-gray-900 p-4 flex justify-end gap-3 border-t">
                <button id="cancel-edit-btn" class="px-4 py-2 border rounded-lg">Cancel</button>
                <button id="save-edit-btn" class="px-4 py-2 bg-purple-600 text-white rounded-lg">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Resume Display Area -->
    <div id="resume-root" class="max-w-4xl mx-auto px-6 pt-24 pb-12"></div>

    <script>
        // ---------- Helper functions ----------
        function generateEditToken() {
            return Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 5);
        }

        // ---------- localStorage Database ----------
        let usersDB = (() => {
            const stored = localStorage.getItem("resume_users_db");
            if (stored) return JSON.parse(stored);
            // Default demo user with edit token
            const defaultToken = generateEditToken();
            const defaultUser = {
                username: "alexmorgan",
                full_name: "Alex Morgan",
                job_title: "Computer Science Student",
                about_text: "Passionate CS student at UC Berkeley...",
                email: "alex@berkeley.edu",
                phone: "(555) 123-4567",
                location: "Berkeley, CA",
                github: "github.com/alexmorgan",
                headings: { about:"About", education:"Education", experience:"Experience", skills:"Skills", certificates:"Certificates", projects:"Projects" },
                skills: [{ name:"JavaScript", level:90 }, { name:"React", level:85 }],
                certificates: [{ name:"AWS Cloud Practitioner", issuer:"Amazon", year:"2024" }],
                experiences: [{ title:"Software Intern", company:"TechCorp", date:"2024", bullets:["Built dashboard"] }],
                projects: [{ name:"StudyBuddy", description:"AI flashcard app", tags:["React","OpenAI"] }],
                editToken: defaultToken
            };
            const db = { alexmorgan: defaultUser };
            localStorage.setItem("resume_users_db", JSON.stringify(db));
            return db;
        })();

        function saveDB() { localStorage.setItem("resume_users_db", JSON.stringify(usersDB)); }

        function createNewUser(username, fullName, email) {
            if (usersDB[username]) return null;
            const editToken = generateEditToken();
            const newUser = {
                username, full_name: fullName, job_title: "Student / Developer",
                about_text: "Write something about yourself...",
                email, phone: "", location: "", github: "",
                headings: { about:"About", education:"Education", experience:"Experience", skills:"Skills", certificates:"Certificates", projects:"Projects" },
                skills: [], certificates: [], experiences: [], projects: [],
                editToken: editToken
            };
            usersDB[username] = newUser;
            saveDB();
            return editToken;
        }

        function getUserByEditToken(token) {
            for (let uname in usersDB) {
                if (usersDB[uname].editToken === token) return usersDB[uname];
            }
            return null;
        }

        // ---------- Global state ----------
        let currentMode = "public";   // "public" or "edit"
        let currentUserData = null;
        let currentUsername = null;

        // ---------- Render (read-only or with edit mode awareness) ----------
        function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => m==='&'?'&amp;': m==='<'?'&lt;':'&gt;'); }

        function renderResume() {
            if (!currentUserData) {
                document.getElementById("resume-root").innerHTML = `
                    <div class="text-center mt-20">
                        <h2 class="text-4xl font-bold">📄 ResumeHub</h2>
                        <p>Create your own resume or search for someone.</p>
                        <button id="welcome-create" class="bg-green-600 px-6 py-2 rounded-full mt-4">+ New Resume</button>
                    </div>`;
                document.getElementById("welcome-create")?.addEventListener("click", () => document.getElementById("create-modal").classList.remove("hidden"));
                return;
            }

            const u = currentUserData;
            const h = u.headings || {};
            const isEditMode = (currentMode === "edit");

            // Build skills bars HTML
            let skillsHtml = "";
            if (u.skills && u.skills.length) {
                skillsHtml = `<div class="grid md:grid-cols-2 gap-4 mt-3" id="skills-container"></div>`;
            }

            // Certificates HTML
            let certsHtml = "";
            if (u.certificates && u.certificates.length) {
                certsHtml = `<div class="grid md:grid-cols-2 gap-3 mt-3" id="certs-container"></div>`;
            }

            const resumeHtml = `
                <div class="text-center mb-10">
                    <h1 class="text-5xl md:text-6xl font-extrabold bg-gradient-to-r from-white to-purple-300 bg-clip-text text-transparent">${escapeHtml(u.full_name)}</h1>
                    <p class="text-purple-300 text-xl mt-2">${escapeHtml(u.job_title)}</p>
                    <div class="flex flex-wrap justify-center gap-5 mt-5 text-sm text-gray-300">
                        ${u.email ? `<span>📧 ${escapeHtml(u.email)}</span>` : ''}
                        ${u.phone ? `<span>📞 ${escapeHtml(u.phone)}</span>` : ''}
                        ${u.location ? `<span>📍 ${escapeHtml(u.location)}</span>` : ''}
                        ${u.github ? `<span>🐙 ${escapeHtml(u.github)}</span>` : ''}
                    </div>
                </div>
                <section class="mb-8"><h2 class="text-2xl font-bold flex items-center gap-2">👤 ${escapeHtml(h.about || "About")}</h2><p class="mt-2 text-gray-300 border-l-4 border-purple-500 pl-4">${escapeHtml(u.about_text)}</p></section>
                <section class="mb-8"><h2 class="text-2xl font-bold flex items-center gap-2">🎓 ${escapeHtml(h.education || "Education")}</h2><div class="bg-gray-900/60 p-5 rounded-xl"><h3 class="font-bold">B.S. Computer Science & AI</h3><p>UC Berkeley · 2023–2027</p><p class="text-sm text-gray-400">GPA: 3.94 · Relevant: ML, Full-stack</p></div></section>
                <section class="mb-8"><h2 class="text-2xl font-bold flex items-center gap-2">💼 ${escapeHtml(h.experience || "Experience")}</h2><div id="exp-container" class="space-y-4 mt-3"></div></section>
                <section class="mb-8"><h2 class="text-2xl font-bold flex items-center gap-2">⚡ ${escapeHtml(h.skills || "Skills")}</h2>${skillsHtml}</section>
                <section class="mb-8"><h2 class="text-2xl font-bold flex items-center gap-2">🏅 ${escapeHtml(h.certificates || "Certificates")}</h2>${certsHtml}</section>
                <section class="mb-8"><h2 class="text-2xl font-bold flex items-center gap-2">🚀 ${escapeHtml(h.projects || "Projects")}</h2><div id="projects-container" class="grid md:grid-cols-2 gap-5 mt-3"></div></section>
            `;
            document.getElementById("resume-root").innerHTML = resumeHtml;

            // Fill experiences
            const expDiv = document.getElementById("exp-container");
            if (expDiv) {
                expDiv.innerHTML = (u.experiences || []).map(exp => `
                    <div class="bg-gray-900/50 p-5 rounded-xl border-l-4 border-purple-500 card-hover">
                        <div class="flex flex-wrap justify-between"><h3 class="font-bold">${escapeHtml(exp.title)}</h3><span class="text-sm text-gray-400">${escapeHtml(exp.date)}</span></div>
                        <p class="text-purple-300 text-sm">${escapeHtml(exp.company)}</p>
                        <ul class="list-disc ml-5 text-sm text-gray-300 mt-2">${exp.bullets.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
                    </div>
                `).join('');
            }

            // Skills bars
            const skillsContainer = document.getElementById("skills-container");
            if (skillsContainer && u.skills) {
                skillsContainer.innerHTML = u.skills.map(s => `
                    <div class="bg-gray-900/60 p-4 rounded-xl"><div class="flex justify-between mb-1"><span>${escapeHtml(s.name)}</span><span class="text-purple-300">${s.level}%</span></div><div class="h-2 bg-gray-700 rounded-full overflow-hidden"><div class="skill-bar-fill h-full bg-gradient-to-r from-purple-500 to-indigo-500 rounded-full" style="width:0%" data-width="${s.level}%"></div></div></div>
                `).join('');
                setTimeout(() => { document.querySelectorAll('[data-width]').forEach(el => el.style.width = el.dataset.width); }, 100);
            }

            // Certificates
            const certsContainer = document.getElementById("certs-container");
            if (certsContainer && u.certificates) {
                certsContainer.innerHTML = u.certificates.map(c => `
                    <div class="bg-gray-900/50 p-3 rounded-xl flex gap-3 items-center"><i data-lucide="badge-check" class="text-purple-400" style="width:20px;"></i><div><p class="font-semibold">${escapeHtml(c.name)}</p><p class="text-xs text-gray-400">${escapeHtml(c.issuer)} · ${c.year}</p></div></div>
                `).join('');
            }

            // Projects
            const projectsContainer = document.getElementById("projects-container");
            if (projectsContainer && u.projects) {
                projectsContainer.innerHTML = u.projects.map(p => `
                    <div class="bg-gray-900/50 p-5 rounded-xl card-hover border border-white/5"><div class="flex items-center gap-2 mb-2"><i data-lucide="code-2" style="width:20px;color:#a78bfa;"></i><h3 class="font-bold text-lg">${escapeHtml(p.name)}</h3></div><p class="text-sm text-gray-300">${escapeHtml(p.description)}</p><div class="flex flex-wrap gap-2 mt-3">${p.tags.map(t => `<span class="bg-purple-900/40 text-purple-200 text-xs px-2 py-1 rounded-full">${escapeHtml(t)}</span>`).join('')}</div></div>
                `).join('');
            }

            lucide.createIcons();

            // Show/hide edit button based on mode
            const editBtn = document.getElementById("edit-mode-btn");
            if (editBtn) {
                if (isEditMode) {
                    editBtn.classList.remove("hidden");
                } else {
                    editBtn.classList.add("hidden");
                }
            }

            // If in public mode, also hide any other edit-related UI (there is none)
        }

        // ---------- Edit modal population & save ----------
        function populateEditModal() {
            const u = currentUserData;
            document.getElementById("edit-name").value = u.full_name || '';
            document.getElementById("edit-title").value = u.job_title || '';
            document.getElementById("edit-about").value = u.about_text || '';
            document.getElementById("edit-email").value = u.email || '';
            document.getElementById("edit-phone").value = u.phone || '';
            document.getElementById("edit-location").value = u.location || '';
            document.getElementById("edit-github").value = u.github || '';
            const h = u.headings || {};
            document.getElementById("heading-about").value = h.about || '';
            document.getElementById("heading-education").value = h.education || '';
            document.getElementById("heading-experience").value = h.experience || '';
            document.getElementById("heading-skills").value = h.skills || '';
            document.getElementById("heading-certificates").value = h.certificates || '';
            document.getElementById("heading-projects").value = h.projects || '';
            document.getElementById("edit-certificates").value = (u.certificates || []).map(c => `${c.name} | ${c.issuer} | ${c.year}`).join('\n');
            document.getElementById("edit-skills").value = JSON.stringify(u.skills || [], null, 2);
            document.getElementById("edit-experience").value = JSON.stringify(u.experiences || [], null, 2);
            document.getElementById("edit-projects").value = JSON.stringify(u.projects || [], null, 2);
        }

        function saveFromModal() {
            const headings = {
                about: document.getElementById("heading-about").value,
                education: document.getElementById("heading-education").value,
                experience: document.getElementById("heading-experience").value,
                skills: document.getElementById("heading-skills").value,
                certificates: document.getElementById("heading-certificates").value,
                projects: document.getElementById("heading-projects").value
            };
            const certLines = document.getElementById("edit-certificates").value.split('\n').filter(l=>l.trim());
            const certificates = certLines.map(l=>{let p=l.split('|'); return { name:p[0]?.trim()||'', issuer:p[1]?.trim()||'', year:p[2]?.trim()||'' }; });
            let skills=[]; try{skills=JSON.parse(document.getElementById("edit-skills").value);}catch(e){alert("Invalid Skills JSON");return;}
            let experiences=[]; try{experiences=JSON.parse(document.getElementById("edit-experience").value);}catch(e){alert("Invalid Experiences JSON");return;}
            let projects=[]; try{projects=JSON.parse(document.getElementById("edit-projects").value);}catch(e){alert("Invalid Projects JSON");return;}
            const updated = {...currentUserData,
                full_name: document.getElementById("edit-name").value,
                job_title: document.getElementById("edit-title").value,
                about_text: document.getElementById("edit-about").value,
                email: document.getElementById("edit-email").value,
                phone: document.getElementById("edit-phone").value,
                location: document.getElementById("edit-location").value,
                github: document.getElementById("edit-github").value,
                headings, skills, certificates, experiences, projects
            };
            usersDB[currentUsername] = updated;
            saveDB();
            currentUserData = updated;
            renderResume();
            document.getElementById("edit-modal").classList.add("hidden");
        }

        // ---------- Routing based on URL ----------
        function loadFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const editToken = params.get('edit_token');
            const username = params.get('user');

            if (editToken) {
                // Edit mode
                const user = getUserByEditToken(editToken);
                if (user) {
                    currentMode = "edit";
                    currentUsername = user.username;
                    currentUserData = user;
                    renderResume();
                } else {
                    document.getElementById("resume-root").innerHTML = `<div class="text-center mt-20"><p class="text-red-400">Invalid or expired edit link.</p><button id="go-home" class="mt-4 bg-purple-600 px-4 py-2 rounded-full">Create New Resume</button></div>`;
                    document.getElementById("go-home")?.addEventListener("click", () => window.location.href = window.location.pathname);
                }
            } 
            else if (username && usersDB[username]) {
                // Public read-only mode
                currentMode = "public";
                currentUsername = username;
                currentUserData = usersDB[username];
                renderResume();
            }
            else {
                // No valid user – show welcome/creation screen
                currentUserData = null;
                renderResume();
            }
        }

        // ---------- Event Listeners ----------
        document.getElementById("search-btn").addEventListener("click", () => {
            const q = document.getElementById("search-input").value.trim().toLowerCase();
            if (!q) return;
            const matches = Object.values(usersDB).filter(u => u.username.includes(q) || u.full_name.toLowerCase().includes(q));
            if (matches.length === 0) alert("No user found");
            else if (matches.length === 1) {
                // Redirect to public view of that user
                window.location.href = `?user=${matches[0].username}`;
            } else {
                const list = matches.map(u => `${u.username} (${u.full_name})`).join("\n");
                const chosen = prompt(`Multiple users found:\n${list}\nEnter exact username:`);
                if (chosen && matches.find(u => u.username === chosen)) window.location.href = `?user=${chosen}`;
                else alert("Invalid selection");
            }
        });

        document.getElementById("create-btn").addEventListener("click", () => document.getElementById("create-modal").classList.remove("hidden"));
        document.getElementById("cancel-create-btn").addEventListener("click", () => document.getElementById("create-modal").classList.add("hidden"));
        document.getElementById("confirm-create-btn").addEventListener("click", () => {
            let uname = document.getElementById("new-username").value.trim().toLowerCase().replace(/\s/g, '');
            let fname = document.getElementById("new-fullname").value.trim();
            let email = document.getElementById("new-email").value.trim();
            if (!uname || !fname || !email) { alert("All fields required"); return; }
            if (usersDB[uname]) { alert("Username already exists. Choose another."); return; }
            const editToken = createNewUser(uname, fname, email);
            alert(`Resume created!\n\n🔗 Public link: ${window.location.origin}${window.location.pathname}?user=${uname}\n✏️ Edit link: ${window.location.origin}${window.location.pathname}?edit_token=${editToken}\n\nKeep your edit link safe!`);
            window.location.href = `?edit_token=${editToken}`; // open in edit mode
        });

        document.getElementById("edit-mode-btn").addEventListener("click", () => {
            if (currentMode === "edit" && currentUserData) {
                populateEditModal();
                document.getElementById("edit-modal").classList.remove("hidden");
            } else {
                alert("Edit mode not available. Use your private edit link.");
            }
        });
        document.getElementById("close-edit-modal").addEventListener("click", () => document.getElementById("edit-modal").classList.add("hidden"));
        document.getElementById("cancel-edit-btn").addEventListener("click", () => document.getElementById("edit-modal").classList.add("hidden"));
        document.getElementById("save-edit-btn").addEventListener("click", saveFromModal);
        document.getElementById("download-btn").addEventListener("click", () => window.print());

        // Close modals when clicking outside
        window.onclick = (e) => {
            if (e.target === document.getElementById("create-modal")) document.getElementById("create-modal").classList.add("hidden");
            if (e.target === document.getElementById("edit-modal")) document.getElementById("edit-modal").classList.add("hidden");
        };

        // Initial load
        loadFromUrl();
        window.addEventListener("popstate", loadFromUrl);
    </script>
</body>
</html>
